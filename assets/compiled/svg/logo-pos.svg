<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Point of Sales Logo</title>
  <desc>Logo Point of Sales gaya Mazer dengan ikon besar dan teks nama besar</desc>

  <!-- Icon: big rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#111827"/>

  <!-- Receipt shape -->
  <rect x="52" y="44" width="56" height="80" rx="5" fill="white"/>
  <!-- Zigzag bottom receipt -->
  <polyline points="52,124 60,136 68,124 76,136 84,124 92,136 100,124 108,136 108,124" fill="none" stroke="#111827" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Lines on receipt -->
  <rect x="62" y="56" width="32" height="4" rx="2" fill="#D1D5DB"/>
  <rect x="62" y="67" width="24" height="4" rx="2" fill="#D1D5DB"/>
  <rect x="62" y="78" width="28" height="4" rx="2" fill="#D1D5DB"/>
  <rect x="62" y="89" width="20" height="4" rx="2" fill="#D1D5DB"/>
  <!-- Price accent line -->
  <rect x="62" y="104" width="36" height="5" rx="2.5" fill="#6366F1"/>

  <!-- Brand text: big like Mazer -->
  <text x="204" y="122" font-family="sans-serif" font-size="88" font-weight="700" fill="#111827" letter-spacing="-2">POS</text>

  <!-- Tagline below -->
  <text x="207" y="158" font-family="sans-serif" font-size="16" font-weight="400" fill="#9CA3AF" letter-spacing="3">POINT OF SALES</text>

  <!-- Accent dots -->
  <circle cx="207" cy="178" r="4" fill="#6366F1"/>
  <circle cx="221" cy="178" r="4" fill="#6366F1" fill-opacity="0.4"/>
  <circle cx="235" cy="178" r="4" fill="#6366F1" fill-opacity="0.15"/>
</svg>